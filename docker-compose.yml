# Single compose file for every environment.
# Database is always Supabase (managed Postgres) — the DATABASE_URL
# env var is set by Coolify in prod or by a local .env file in dev.
# There is no local postgres container; tailnet access to Supabase
# is required to run the stack anywhere.
services:
  domainwatch:
    build: .
    # Host-port 18081 is what Coolify's proxy already routes to for this
    # app. Publishing 8080:8080 clashes with the Coolify host's own port
    # 8080. If a developer has 18081 taken locally, override with:
    #   HOST_PORT=19081 docker compose up --build
    ports:
      - "${HOST_PORT:-18081}:8080"
    restart: unless-stopped
    # env_file reads .env from the repo root for local dev.
    # On Coolify, variables set in the Environment Variables panel
    # take precedence and this file is irrelevant.
    env_file:
      - path: ./.env
        required: false
